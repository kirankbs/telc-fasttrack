name: CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'tests/**'
      - '.github/workflows/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'turbo.json'
  pull_request:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'tests/**'
      - '.github/workflows/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'turbo.json'

jobs:
  test:
    name: Typecheck + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo run lint --filter='!@fastrack/mobile'

      - name: Typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm turbo run test --filter='!@fastrack/mobile'
