name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '__tests__/**'
      - '.github/workflows/**'
      - 'package-lock.json'
      - 'package.json'
      - 'tsconfig.json'
      - 'babel.config.js'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - '__tests__/**'
      - '.github/workflows/**'
      - 'package-lock.json'
      - 'package.json'
      - 'tsconfig.json'
      - 'babel.config.js'

jobs:
  test:
    name: Typecheck + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx jest --no-cache --forceExit --ci
